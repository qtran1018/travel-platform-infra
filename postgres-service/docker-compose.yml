services:
  postgres:
    image: postgres:16-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      # Per-app credentials passed to init.sh — override in prod via secrets file
      SPLITPUSH_DB_PASSWORD: ${SPLITPUSH_DB_PASSWORD:-splitpush_pass}
      TRAVELBIN_DB_PASSWORD: ${TRAVELBIN_DB_PASSWORD:-travelbin}
      ITINERARY_DB_PASSWORD: ${ITINERARY_DB_PASSWORD:-itinerary_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - travelplatform-network

volumes:
  postgres_data:

networks:
  travelplatform-network:
    external: true
