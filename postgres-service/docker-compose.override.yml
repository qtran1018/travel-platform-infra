# LOCAL DEV ONLY — automatically applied by `docker compose up`.
# Production deploy uses: docker compose -f docker-compose.yml up
#
# Exposes postgres on localhost only (not 0.0.0.0) so local DB tools
# (pgAdmin, psql, DBeaver) can connect. Never reachable from the internet.

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
