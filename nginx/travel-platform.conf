server {
    listen 80;
    listen [::]:80;
    server_name quangntran.com;
    return 301 https://www.quangntran.com$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name quangntran.com;
    ssl_certificate /etc/letsencrypt/live/auth.quangntran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.quangntran.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://www.quangntran.com$request_uri;
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name auth.quangntran.com;
    ssl_certificate /etc/letsencrypt/live/auth.quangntran.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.quangntran.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://localhost:8180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name splitpush.quangntran.com;
    ssl_certificate /etc/letsencrypt/live/auth.quangntran.com/fullchain.pem;
