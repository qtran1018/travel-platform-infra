services:
  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      # Only applied on first volume init. On an existing keycloak_pgdata volume the
      # real password is unchanged — keep this matching the volume or run ALTER USER.
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD not set}

    volumes:
      - keycloak_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - travelplatform-network
  
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD not set}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      # Only seeds the admin on first boot. Rotate an existing admin via console/kcadm.
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD not set}
      JAVA_OPTS_APPEND: "-Xms128m -Xmx384m"
      KC_HOSTNAME: https://auth.quangntran.com
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    ports:
      - "127.0.0.1:8180:8080"
    volumes:
      - ./themes:/opt/keycloak/themes
    depends_on:
      - keycloak-db
    restart: unless-stopped
    networks:
      - travelplatform-network

volumes: 
  keycloak_pgdata:

networks:
  travelplatform-network:
    external: true